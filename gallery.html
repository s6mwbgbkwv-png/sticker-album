<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>造景贴纸图鉴 - 图鉴库</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-leaf"></i> 造景贴纸图鉴
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="gallery.html" class="active">图鉴库</a></li>
                <li><a href="feedback.html">意见箱</a></li>
            </ul>
            <div class="nav-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <!-- 搜索与筛选区域 -->
        <section class="search-section">
            <div class="search-container">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索贴纸名称、厂家、系列...">
                </div>
                <div class="filter-bar">
                    <select id="brandFilter">
                        <option value="">全部厂家</option>
                        <option value="mindwave">Mind Wave</option>
                        <option value="furukawa">古川纸工</option>
                        <option value="q-lia">Q-Lia</option>
                        <option value="beverly">Beverly</option>
                        <option value="kamio">Kamio Japan</option>
                        <option value="aiueo">AIUEO</option>
                    </select>
                    <select id="seriesFilter">
                        <option value="">全部系列</option>
                        <option value="animal">动物系列</option>
                        <option value="food">食物系列</option>
                        <option value="flower">花卉系列</option>
                        <option value="daily">日常系列</option>
                        <option value="season">季节限定</option>
                    </select>
                    <select id="priceFilter">
                        <option value="">价格范围</option>
                        <option value="0-500">¥0 - ¥500</option>
                        <option value="500-1000">¥500 - ¥1000</option>
                        <option value="1000-2000">¥1000 - ¥2000</option>
                        <option value="2000+">¥2000以上</option>
                    </select>
                    <button id="resetFilter" class="btn-outline">重置筛选</button>
                </div>
                <div class="search-info">
                    <span id="resultCount">显示 0 个结果</span>
                    <div class="view-toggle">
                        <button class="btn-icon active" data-view="grid"><i class="fas fa-th"></i></button>
                        <button class="btn-icon" data-view="list"><i class="fas fa-list"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 图鉴展示区 -->
        <section class="gallery-section">
            <div class="gallery-grid" id="galleryGrid">
                <!-- 由JS动态生成 -->
            </div>
            <div class="no-results" id="noResults" style="display: none;">
                <i class="fas fa-search"></i>
                <p>没有找到匹配的贴纸</p>
                <p class="sub-text">试试其他关键词或筛选条件</p>
            </div>
        </section>

        <!-- 分页 -->
        <div class="pagination" id="pagination">
            <!-- 由JS动态生成 -->
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>© 2024 造景贴纸图鉴 | 仅供学习交流使用</p>
            <p class="footer-sub">图片版权归原作者及厂家所有</p>
        </div>
    </footer>

    <script src="js/gallery.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/main.js"></script>
    <script>
        // 初始化图鉴页面
        initializeGalleryPage();
    </script>
</body>
</html>
